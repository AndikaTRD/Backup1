kind = "web"
previewPath = "/"
title = "ANDIKA STORE"
version = "1.0.0"
id = "artifacts/andika-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24216

[services.development]
run = "pnpm --filter @workspace/andika-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/andika-store", "run", "build" ]
publicDir = "artifacts/andika-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24216"
BASE_PATH = "/"
